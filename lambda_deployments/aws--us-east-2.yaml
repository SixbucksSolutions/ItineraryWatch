# serverless.yml
service: itinerary-watch

provider:
  name: aws
  region: us-east-2
  runtime: python3.14
  architecture: arm64

package:
  individually: true             # Packages each function into its own independent zip file
  patterns:
    - '!**'                       # 1. Exclude absolutely everything

functions:
  db_maintenance:
    handler: src/handlers/analytics.handler


custom:
  pythonRequirements:
    useUv: true        # Automatically reads uv.lock (enabled by default)
    installer: uv      # Tells Serverless to also use uv (instead of pip) to install package