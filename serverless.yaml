# "org" ensures this Service is used with the correct Serverless Framework Access Key.
org: firsttracks

service: itinerary-watch

provider:
  name: aws
  region: us-east-2
  runtime: python3.14
  architecture: arm64
  logRetentionInDays: 30
  logs:
    lambda:
      logFormat: Text

package:
  individually: true              # Packages all functions into their own independent ZIP file
  patterns:
    - '!**'                       # Default is ignore everything

functions:

  db_maintenance:
    events:
      - schedule: cron(1 0 * * ? *)   # EventBridge scheduled event at 00:01 UTC every day
    role: arn:aws:iam::293119271420:role/ItineraryWatch_Lambda
    handler: src/db_maintenance.lambda_entry_point_event_bridge
    memorySize: 256
    timeout: 20 # 20 second runtime to be safe
    package:
      patterns:
        - 'src/db_maintenance.py'
        - 'src/aws-rds-global-bundle.pem'

  scraper_launcher:
    events:
      - schedule: cron(0 * * * ? *)   # EventBridge scheduled event on the hour, every hour
    role: arn:aws:iam::293119271420:role/ItineraryWatch_Lambda
    handler: src/scraper_launcher.lambda_entry_point_event_bridge
    memorySize: 256
    timeout: 20 # 20 second runtime to be safe
    package:
      patterns:
        - 'src/scraper_launcher.py'
        - 'src/aws-rds-global-bundle.pem'

  itinerary_watch_scraper:
    events:
      - sns: arn:aws:sns:us-east-2:293119271420:itinerary_watch_scraper_trigger
    role: arn:aws:iam::293119271420:role/ItineraryWatch_Lambda
    handler: src/itinerary_watch_scraper.lambda_entry_point_sns
    memorySize: 512
    timeout: 60
    package:
      patterns:
        - 'src/itinerary_watch_scraper.py'
        - 'src/cruise_day_detail.py'
        - 'src/cruise_sailing.py'
        - 'src/cruise_lines/*.py'
        - 'src/aws-rds-global-bundle.pem'

custom:
  pythonRequirements:
    useUv: true                   # Automatically processes your uv.lock
    installer: uv                 # Fast dependency resolution using uv binary

    # Don't package python deps that are already in lambda environment or are for types only
    noDeploy:
      - boto3
      - botocore
      - jmespath
      - s3transfer
      - boto3-stubs
      - botocore-stubs
      - types-awscrt
      - types-s3transfer